// ==================== 音频系统（Web Audio API） ====================
const AudioSys = {
  ctx: null,
  init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  },
  playTone(freq, duration, type = 'square', vol = 0.1) {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + duration);
  },
  // 清脆的加分音效（"叮"）
  playGood() {
    this.playTone(880, 0.1, 'square', 0.08);
    setTimeout(() => this.playTone(1100, 0.15, 'square', 0.06), 50);
  },
  // 沉闷的减分音效（"噗"）
  playBad() {
    this.playTone(150, 0.3, 'sawtooth', 0.1);
    setTimeout(() => this.playTone(100, 0.3, 'sawtooth', 0.08), 100);
  },
  // 特殊事件音效
  playSpecial() {
    [523, 659, 784, 1047].forEach((f, i) => {
      setTimeout(() => this.playTone(f, 0.15, 'square', 0.07), i * 80);
    });
  },
  // 游戏结束音效
  playGameOver() {
    [400, 350, 300, 200].forEach((f, i) => {
      setTimeout(() => this.playTone(f, 0.3, 'sawtooth', 0.1), i * 200);
    });
  }
};

const Input = {
  keys: {},
  mouseX: GAME_WIDTH / 2,
  mouseActive: false,
  init() {
    window.addEventListener('keydown', e => {
      this.keys[e.key.toLowerCase()] = true;
      // 防止方向键滚动页面
      if (['arrowleft', 'arrowright', 'arrowup', 'arrowdown', ' '].includes(e.key.toLowerCase())) {
        e.preventDefault();
      }
      // 空格：开始/暂停/继续
      if (e.key === ' ') {
        if (game.state === GameState.MENU || game.state === GameState.GAMEOVER) {
          startGame();
        } else if (game.state === GameState.PLAYING) {
          game.state = GameState.PAUSED;
        } else if (game.state === GameState.PAUSED) {
          game.state = GameState.PLAYING;
          lastTime = performance.now(); // 防止暂停期间 dt 过大
        }
      }
    });
    window.addEventListener('keyup', e => {
      this.keys[e.key.toLowerCase()] = false;
    });
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = GAME_WIDTH / rect.width;
      this.mouseX = (e.clientX - rect.left) * scaleX;
      this.mouseActive = true;
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleX = GAME_WIDTH / rect.width;
      this.mouseX = (e.touches[0].clientX - rect.left) * scaleX;
      this.mouseActive = true;
    }, { passive: false });
    canvas.addEventListener('mousedown', () => {
      AudioSys.init();
      if (game.state === GameState.CHAR_SELECT) {
        if (Input.mouseX < GAME_WIDTH / 2) {
          game.trailblazer = 'male';
        } else {
          game.trailblazer = 'female';
        }
        game.state = GameState.MENU;
      } else if (game.state === GameState.MENU || game.state === GameState.GAMEOVER) {
        startGame();
      }
    });
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      AudioSys.init();
      const rect = canvas.getBoundingClientRect();
      const scaleX = GAME_WIDTH / rect.width;
      const tx = (e.touches[0].clientX - rect.left) * scaleX;
      if (game.state === GameState.CHAR_SELECT) {
        if (tx < GAME_WIDTH / 2) {
          game.trailblazer = 'male';
        } else {
          game.trailblazer = 'female';
        }
        game.state = GameState.MENU;
      } else if (game.state === GameState.MENU || game.state === GameState.GAMEOVER) {
        startGame();
      }
    }, { passive: false });
  },
  isLeft() {
    return this.keys['a'] || this.keys['arrowleft'];
  },
  isRight() {
    return this.keys['d'] || this.keys['arrowright'];
  }
};

// 根据权重和难度计算掉落概率
function getSpawnWeights() {
  const weights = {};
  for (const [type, def] of Object.entries(ITEM_DEFS)) {
    weights[type] = def.weight;
  }
  // 难度调整：分数越高，减益道具权重越高
  const difficultyFactor = Math.min(game.score / 1000, 1);
  weights[ItemType.TRASH] += difficultyFactor * 10;
  weights[ItemType.SLIME] += difficultyFactor * 5;
  weights[ItemType.SEAWEED_SOUP] += difficultyFactor * 3;
  weights[ItemType.HUOHUO] += difficultyFactor * 4;
  weights[ItemType.MONSTER] += difficultyFactor * 3;
  weights[ItemType.TAIL] += difficultyFactor * 4;

  // 彩虹雨事件期间只生成加分道具
  if (game.rainbowEvent > 0) {
    for (const [type, def] of Object.entries(ITEM_DEFS)) {
      if (def.category !== 'good') {
        weights[type] = 0;
      }
    }
  }
  return weights;
}

function randomItemType() {
  const weights = getSpawnWeights();
  const total = Object.values(weights).reduce((a, b) => a + b, 0);
  let rand = Math.random() * total;
  for (const [type, w] of Object.entries(weights)) {
    if (w <= 0) continue;
    rand -= w;
    if (rand <= 0) return parseInt(type);
  }
  return ItemType.PARSNIP;
}

// ==================== 道具类 ====================
class Item {
  constructor() {
    this.type = randomItemType();
    this.def = ITEM_DEFS[this.type];
    this.width = CONFIG.itemSize;
    this.height = CONFIG.itemSize;
    this.x = Math.random() * (GAME_WIDTH - this.width);
    this.y = -this.height;
    // 基础速度 + 难度加成 + 随机波动
    const difficultyBonus = Math.floor(game.score / CONFIG.speedScoreStep) * 0.3;
    this.speed = (CONFIG.baseFallSpeed + difficultyBonus + Math.random() * 1.5) * game.currentFallSpeedMultiplier;
    // 彩虹雨事件期间速度减半
    if (game.rainbowEvent > 0) {
      this.speed *= 0.5;
    }
    this.rot = 0;
    this.rotSpeed = (Math.random() - 0.5) * 0.1;
    this.floatOffset = Math.random() * Math.PI * 2;
    this.markedForDelete = false;
  }

  update(dt) {
    this.y += this.speed;
    this.rot += this.rotSpeed;
    // 大风效果：道具横向飘移（可扩展为天气事件）
    if (game.frames % 120 < 60) {
      this.x += Math.sin(game.frames * 0.02 + this.floatOffset) * 0.3;
    }
    // 边界限制
    if (this.x < 0) this.x = 0;
    if (this.x > GAME_WIDTH - this.width) this.x = GAME_WIDTH - this.width;

    // 超出屏幕底部
    if (this.y > GAME_HEIGHT) {
      this.markedForDelete = true;
      // 加分道具漏掉扣生命
      if (this.def.category === 'good') {
        game.lives--;
        game.combo = 0;
        createFloatingText(this.x, GAME_HEIGHT - 40, '漏掉!', '#ff4444');
        checkGameOver();
      }
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
    ctx.rotate(this.rot);
    const bob = Math.sin(game.frames * 0.1 + this.floatOffset) * 2;
    ctx.translate(0, bob);
    drawItemSprite(ctx, this.type, -this.width / 2, -this.height / 2, this.width, this.height);
    ctx.restore();
  }
}

// ==================== 粒子系统 ====================
class Particle {
  constructor(x, y, color, speed = 3, life = 30) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * speed * 2;
    this.vy = (Math.random() - 0.5) * speed * 2 - 1;
    this.life = life;
    this.maxLife = life;
    this.color = color;
    this.size = Math.random() * 4 + 2;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.1; // 重力
    this.life--;
  }
  draw(ctx) {
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.fillRect(Math.floor(this.x), Math.floor(this.y), Math.floor(this.size), Math.floor(this.size));
    ctx.globalAlpha = 1;
  }
}

// ==================== 飘字系统 ====================
class FloatingText {
  constructor(x, y, text, color, life = 45) {
    this.x = x;
    this.y = y;
    this.text = text;
    this.color = color;
    this.life = life;
    this.maxLife = life;
    this.vy = -1.5;
  }
  update() {
    this.y += this.vy;
    this.life--;
  }
  draw(ctx) {
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.font = 'bold 14px "Microsoft YaHei", "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(this.text, this.x, this.y);
    ctx.globalAlpha = 1;
  }
}

// ==================== 云朵背景 ====================
class Cloud {
  constructor() {
    this.x = Math.random() * GAME_WIDTH;
    this.y = Math.random() * 200 + 30;
    this.speed = Math.random() * 0.2 + 0.05;
    this.width = Math.random() * 80 + 60;
    this.height = Math.random() * 30 + 20;
    this.hue = Math.random() < 0.5 ? 250 : 280; // 紫色或蓝紫色
  }
  update() {
    this.x += this.speed;
    if (this.x > GAME_WIDTH + this.width) {
      this.x = -this.width;
      this.y = Math.random() * 200 + 30;
    }
  }
  draw(ctx) {
    ctx.fillStyle = `hsla(${this.hue}, 60%, 60%, 0.08)`;
    ctx.fillRect(Math.floor(this.x), Math.floor(this.y), this.width, this.height);
    ctx.fillStyle = `hsla(${this.hue}, 50%, 70%, 0.05)`;
    ctx.fillRect(Math.floor(this.x + 15), Math.floor(this.y - 10), this.width - 30, this.height * 0.6);
  }
}

// ==================== 绘制函数（像素风精灵） ====================
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawItemSprite(ctx, type, x, y, w, h) {
  const cx = x + w / 2;
  const cy = y + h / 2;
  switch (type) {
    case ItemType.PARSNIP: {
      // 星琼（金色六角星晶体）- anime 风格发光
      ctx.save();
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 10;
      const grad = ctx.createRadialGradient(cx, cy - 4, 2, cx, cy, 16);
      grad.addColorStop(0, '#FFF8DC');
      grad.addColorStop(0.4, '#FFD700');
      grad.addColorStop(1, '#DAA520');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(cx, cy - 14);
      ctx.lineTo(cx + 6, cy - 6);
      ctx.lineTo(cx + 14, cy - 4);
      ctx.lineTo(cx + 8, cy + 2);
      ctx.lineTo(cx + 10, cy + 12);
      ctx.lineTo(cx, cy + 8);
      ctx.lineTo(cx - 10, cy + 12);
      ctx.lineTo(cx - 8, cy + 2);
      ctx.lineTo(cx - 14, cy - 4);
      ctx.lineTo(cx - 6, cy - 6);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.beginPath();
      ctx.ellipse(cx - 3, cy - 5, 2, 3, -0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      break;
    }
    case ItemType.GOLD_PARSNIP: {
      // 古老星琼（大金色星，带光晕）
      ctx.save();
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 18;
      const glow = ctx.createRadialGradient(cx, cy, 4, cx, cy, 20);
      glow.addColorStop(0, 'rgba(255,215,0,0.6)');
      glow.addColorStop(1, 'rgba(255,215,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, 20, 0, Math.PI * 2);
      ctx.fill();
      const grad = ctx.createRadialGradient(cx, cy - 4, 2, cx, cy, 16);
      grad.addColorStop(0, '#FFF8DC');
      grad.addColorStop(0.4, '#FFD700');
      grad.addColorStop(1, '#B8860B');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(cx, cy - 16);
      ctx.lineTo(cx + 5, cy - 6);
      ctx.lineTo(cx + 16, cy - 4);
      ctx.lineTo(cx + 8, cy + 4);
      ctx.lineTo(cx + 12, cy + 14);
      ctx.lineTo(cx, cy + 10);
      ctx.lineTo(cx - 12, cy + 14);
      ctx.lineTo(cx - 8, cy + 4);
      ctx.lineTo(cx - 16, cy - 4);
      ctx.lineTo(cx - 5, cy - 6);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath();
      ctx.ellipse(cx - 3, cy - 4, 2.5, 3.5, -0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      break;
    }
    case ItemType.STARFRUIT: {
      // 光锥（发光卡片）
      ctx.save();
      ctx.shadowColor = '#a78bfa';
      ctx.shadowBlur = 12;
      const cardGrad = ctx.createLinearGradient(x + 4, y + 2, x + 28, y + 30);
      cardGrad.addColorStop(0, '#4c1d95');
      cardGrad.addColorStop(1, '#312e81');
      ctx.fillStyle = cardGrad;
      roundRect(ctx, x + 4, y + 2, 24, 28, 4);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#1e1b4b';
      roundRect(ctx, x + 7, y + 5, 18, 22, 3);
      ctx.fill();
      ctx.fillStyle = `rgba(167, 139, 250, ${0.5 + Math.sin(game.frames * 0.1) * 0.3})`;
      ctx.beginPath();
      ctx.moveTo(x + 10, y + 8);
      ctx.lineTo(x + 22, y + 8);
      ctx.lineTo(x + 18, y + 22);
      ctx.lineTo(x + 14, y + 22);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#c4b5fd';
      ctx.beginPath();
      ctx.moveTo(cx, cy - 4);
      ctx.lineTo(cx + 5, cy);
      ctx.lineTo(cx, cy + 4);
      ctx.lineTo(cx - 5, cy);
      ctx.closePath();

      if (img.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, x, y, w, h);
      } else {
        ctx.fillStyle = '#64748b';
        ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI * 2); ctx.fill();
      }
      break;
    }
    default: {
      ctx.fillStyle = '#888888';
      ctx.beginPath();
      ctx.arc(cx, cy, 10, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawPlayerSprite(ctx, x, y, w, h, facingRight) {
  ctx.save();

  // 使用图片精灵
  const img = game.trailblazer === 'female' ? imgStellar : imgStellarMale;
  if (img.complete && img.naturalWidth > 0) {
    // 图片绘制：居中，按比例缩放
    const scale = Math.min(w / img.naturalWidth, h / img.naturalHeight) * 1.2;
    const drawW = img.naturalWidth * scale;
    const drawH = img.naturalHeight * scale;
    const drawX = x + (w - drawW) / 2;
    const drawY = y + h - drawH;

    if (!facingRight) {
      ctx.translate(drawX + drawW / 2, drawY + drawH / 2);
      ctx.scale(-1, 1);
      ctx.translate(-(drawX + drawW / 2), -(drawY + drawH / 2));
    }

    ctx.drawImage(img, drawX, drawY, drawW, drawH);
  } else {
    // 加载中的后备绘制
    const cx = x + w / 2;
    const cy = y + h;
    if (game.trailblazer === 'female') {
      drawTrailblazerFemaleGame(ctx, cx, cy);
    } else {
      drawTrailblazerMaleGame(ctx, cx, cy);
    }
  }

  ctx.restore();

  // 护盾效果（在 restore 后绘制，避免受翻转影响）
  if (game.shieldEvent > 0) {
    const cx = x + w / 2;
    const cy = y + h / 2;
    ctx.strokeStyle = `rgba(56, 189, 248, ${0.5 + Math.sin(game.frames * 0.2) * 0.3})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, w / 2 + 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = `rgba(56, 189, 248, ${0.1 + Math.sin(game.frames * 0.15) * 0.05})`;
    ctx.beginPath();
    ctx.arc(cx, cy, w / 2 + 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ==================== 背景绘制（星穹铁道太空主题） ====================
function drawBackground(ctx) {
  // 1. 深空背景 - 深蓝到深紫
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
  skyGrad.addColorStop(0, '#060a1a');
  skyGrad.addColorStop(0.35, '#0d0f2e');
  skyGrad.addColorStop(0.65, '#141040');
  skyGrad.addColorStop(1, '#1a1240');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

  // 2. 星云
  game.clouds.forEach(cloud => cloud.draw(ctx));

  // 3. 星星
  game.stars.forEach(star => {
    const twinkle = 0.4 + Math.sin(game.frames * 0.05 + star.phase) * 0.4;
    ctx.globalAlpha = twinkle * star.brightness;
    ctx.fillStyle = star.color;
    ctx.fillRect(Math.floor(star.x), Math.floor(star.y), star.size, star.size);
    if (star.size >= 2) {
      ctx.fillStyle = `rgba(200, 230, 255, ${twinkle * 0.3})`;
      ctx.fillRect(Math.floor(star.x - 1), Math.floor(star.y), star.size + 2, star.size);
      ctx.fillRect(Math.floor(star.x), Math.floor(star.y - 1), star.size, star.size + 2);
    }
  });
  ctx.globalAlpha = 1;

  // 4. 远处星球
  // 大行星
  ctx.fillStyle = 'rgba(139, 92, 246, 0.15)';
  ctx.beginPath();
  ctx.arc(680, 200, 80, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(139, 92, 246, 0.08)';
  ctx.beginPath();
  ctx.arc(680, 200, 110, 0, Math.PI * 2);
  ctx.fill();
  // 行星环
  ctx.strokeStyle = 'rgba(167, 139, 250, 0.12)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(680, 200, 120, 25, Math.PI * 0.15, 0, Math.PI * 2);
  ctx.stroke();

  // 小行星
  ctx.fillStyle = 'rgba(56, 189, 248, 0.2)';
  ctx.beginPath();
  ctx.arc(120, 150, 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(56, 189, 248, 0.1)';
  ctx.beginPath();
  ctx.arc(120, 150, 45, 0, Math.PI * 2);
  ctx.fill();

  // 5. 远处空间站剪影
  drawStation(ctx, 250, 180, 0.6);
  drawStation(ctx, 550, 220, 0.4);

  // 6. 星穹列车轨道（金属平台）
  const railY = 400;
  // 平台底色
  const railGrad = ctx.createLinearGradient(0, railY, 0, GAME_HEIGHT);
  railGrad.addColorStop(0, '#1e1b4b');
  railGrad.addColorStop(0.2, '#312e81');
  railGrad.addColorStop(1, '#1e1b4b');
  ctx.fillStyle = railGrad;
  ctx.fillRect(0, railY, GAME_WIDTH, GAME_HEIGHT - railY);

  // 金属纹理线
  ctx.strokeStyle = 'rgba(99, 102, 241, 0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i < GAME_WIDTH; i += 40) {
    ctx.beginPath();
    ctx.moveTo(i, railY);
    ctx.lineTo(i, GAME_HEIGHT);
    ctx.stroke();
  }
  // 横向科技线
  ctx.strokeStyle = 'rgba(129, 140, 248, 0.2)';
  for (let j = railY + 20; j < GAME_HEIGHT; j += 30) {
    ctx.beginPath();
    ctx.moveTo(0, j);
    ctx.lineTo(GAME_WIDTH, j);
    ctx.stroke();
  }

  // 发光边缘线
  ctx.strokeStyle = 'rgba(99, 102, 241, 0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, railY);
  ctx.lineTo(GAME_WIDTH, railY);
  ctx.stroke();

  // 7. 近景科技柱
  drawTechPillar(ctx, 50, railY, 0.8);
  drawTechPillar(ctx, 750, railY, 0.9);

  // 8. 星穹列车剪影（远景）
  drawTrain(ctx, 350, railY - 45);

  // 9. 全息投影板
  drawHoloPanel(ctx, 100, 420, '轨道 A-7');
  drawHoloPanel(ctx, 620, 420, '空间站');

  // 10. 能量粒子（漂浮的光点）
  for (let i = 0; i < 12; i++) {
    const px = ((game.frames * 0.2 + i * 67) % (GAME_WIDTH + 40)) - 20;
    const py = railY + 10 + Math.sin(game.frames * 0.03 + i * 2.1) * 30 + (i * 19) % 60;
    const glow = 0.3 + Math.sin(game.frames * 0.06 + i) * 0.3;
    ctx.fillStyle = `rgba(56, 189, 248, ${glow})`;
    ctx.fillRect(Math.floor(px), Math.floor(py), 2, 2);
    ctx.fillStyle = `rgba(56, 189, 248, ${glow * 0.2})`;
    ctx.fillRect(Math.floor(px - 1), Math.floor(py - 1), 4, 4);
  }
}

// ==================== 星穹铁道背景辅助函数 ====================
function drawStation(ctx, x, y, scale) {
  const s = scale;
  // 主体圆环
  ctx.strokeStyle = 'rgba(129, 140, 248, 0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, 30*s, 0, Math.PI * 2);
  ctx.stroke();
  // 内部结构
  ctx.strokeStyle = 'rgba(99, 102, 241, 0.2)';
  ctx.beginPath();
  ctx.arc(x, y, 20*s, 0, Math.PI * 2);
  ctx.stroke();
  // 支架
  ctx.strokeStyle = 'rgba(129, 140, 248, 0.15)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    const angle = (Math.PI / 4) + (Math.PI / 2) * i;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(angle) * 45*s, y + Math.sin(angle) * 45*s);
    ctx.stroke();
  }
  // 中心光点
  ctx.fillStyle = 'rgba(167, 139, 250, 0.5)';
  ctx.beginPath();
  ctx.arc(x, y, 4*s, 0, Math.PI * 2);
  ctx.fill();
}

function drawTechPillar(ctx, x, y, scale) {
  const s = scale;
  const w = 12 * s;
  const h = 120 * s;
  // 柱体
  ctx.fillStyle = '#1e1b4b';
  ctx.beginPath();
  ctx.roundRect(x - w/2, y - h, w, h, 2);
  ctx.fill();
  ctx.fillStyle = '#312e81';
  ctx.beginPath();
  ctx.roundRect(x - w/2 + 2, y - h + 2, w - 4, h - 4, 2);
  ctx.fill();
  // 发光条
  const glowH = Math.sin(game.frames * 0.05) * 0.3 + 0.5;
  ctx.fillStyle = `rgba(99, 102, 241, ${glowH})`;
  ctx.beginPath();
  ctx.roundRect(x - w/2 + 3, y - h * 0.7, w - 6, h * 0.4, 2);
  ctx.fill();
  // 顶部灯
  ctx.fillStyle = `rgba(56, 189, 248, ${0.6 + Math.sin(game.frames * 0.08) * 0.3})`;
  ctx.beginPath();
  ctx.roundRect(x - w/2 - 2, y - h - 3, w + 4, 3, 1);
  ctx.fill();
}

function drawTrain(ctx, x, y) {
  // 星穹列车主体 - anime 风格
  ctx.save();
  // 车厢
  ctx.fillStyle = '#1e1b4b';
  ctx.beginPath();
  ctx.roundRect(x, y, 120, 35, 4);
  ctx.fill();
  ctx.fillStyle = '#312e81';
  ctx.beginPath();
  ctx.roundRect(x + 2, y + 2, 116, 31, 3);
  ctx.fill();
  // 窗户（发光）
  ctx.fillStyle = `rgba(167, 139, 250, ${0.5 + Math.sin(game.frames * 0.03) * 0.2})`;
  ctx.beginPath();
  ctx.roundRect(x + 15, y + 8, 25, 14, 3);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(x + 45, y + 8, 25, 14, 3);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(x + 75, y + 8, 20, 14, 3);
  ctx.fill();
  // 车头
  ctx.fillStyle = '#1e1b4b';
  ctx.beginPath();
  ctx.moveTo(x + 120, y + 5);
  ctx.lineTo(x + 145, y + 17);
  ctx.lineTo(x + 120, y + 30);
  ctx.closePath();
  ctx.fill();
  // 车头灯
  ctx.fillStyle = `rgba(56, 189, 248, ${0.7 + Math.sin(game.frames * 0.1) * 0.2})`;
  ctx.shadowColor = '#38bdf8';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.ellipse(x + 140, y + 17, 3, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // 底部轨道光效
  ctx.fillStyle = 'rgba(99, 102, 241, 0.3)';
  ctx.fillRect(x - 10, y + 35, 170, 2);
  // 车轮
  ctx.fillStyle = '#4338ca';
  ctx.beginPath();
  ctx.arc(x + 24, y + 36, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 59, y + 36, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 94, y + 36, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawHoloPanel(ctx, x, y, text) {
  // 全息面板底座
  ctx.fillStyle = 'rgba(30, 27, 75, 0.6)';
  ctx.beginPath();
  ctx.roundRect(x, y, 70, 24, 3);
  ctx.fill();
  // 边框
  ctx.strokeStyle = 'rgba(56, 189, 248, 0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(x, y, 70, 24, 3);
  ctx.stroke();
  // 角标
  ctx.fillStyle = 'rgba(56, 189, 248, 0.6)';
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + 6, y);
  ctx.lineTo(x, y + 6);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 70, y + 24);
  ctx.lineTo(x + 64, y + 24);
  ctx.lineTo(x + 70, y + 18);
  ctx.closePath();
  ctx.fill();
  // 文字
  ctx.font = '10px sans-serif';
  ctx.fillStyle = `rgba(56, 189, 248, ${0.7 + Math.sin(game.frames * 0.04) * 0.3})`;
  ctx.textAlign = 'center';
  ctx.fillText(text, x + 35, y + 16);
}

// ==================== 特效生成 ====================
function createParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    game.particles.push(new Particle(x, y, color));
  }
}

function createFloatingText(x, y, text, color) {
  game.floatingTexts.push(new FloatingText(x, y, text, color));
}

// ==================== 碰撞检测（AABB） ====================
function checkCollision(a, b) {
  return a.x < b.x + b.width &&
         a.x + a.width > b.x &&
         a.y < b.y + b.height &&
         a.y + a.height > b.y;
}

// ==================== 道具效果处理 ====================
function applyItemEffect(item, isClone = false) {
  const def = item.def;
  let scoreGain = def.score;

  // 连击倍率
  if (def.category === 'good' && !isClone) {
    game.combo++;
    game.totalCaught++;
    if (game.combo >= CONFIG.comboThreshold) {
      const multiplier = Math.min(1 + Math.floor((game.combo - CONFIG.comboThreshold) / 5) * 0.2, CONFIG.maxComboMultiplier);
      scoreGain = Math.floor(scoreGain * multiplier);
    }
    game.maxCombo = Math.max(game.maxCombo, game.combo);
  } else if (def.category === 'bad' && !isClone) {
    game.combo = 0;
  }

  // 分身只获得一半分数
  if (isClone && def.category === 'good') {
    scoreGain = Math.floor(scoreGain / 2);
  }

  game.score += scoreGain;

  // 回血
  if (def.heal && !isClone) {
    game.lives = Math.min(game.lives + def.heal, 5);
  }

  // 特效与音效
  if (def.category === 'good') {
    createParticles(item.x + item.width / 2, item.y + item.height / 2, '#FFD700', 10);
    AudioSys.playGood();
    createFloatingText(item.x + item.width / 2, item.y, `+${scoreGain}`, '#FFD700');
  } else if (def.category === 'bad') {
    createParticles(item.x + item.width / 2, item.y + item.height / 2, '#8B0000', 10);
    AudioSys.playBad();
    createFloatingText(item.x + item.width / 2, item.y, `${scoreGain}`, '#FF4444');
  } else {
    createParticles(item.x + item.width / 2, item.y + item.height / 2, '#00FFFF', 12);
    AudioSys.playSpecial();
    createFloatingText(item.x + item.width / 2, item.y, def.name, '#00FFFF');
  }

  // 负面效果
  if (def.effect === 'shake' && !isClone) {
    game.shakeTime = 1000;
    game.screenShakeIntensity = 8;
  }
  if (def.effect === 'slow' && !isClone) {
    game.slowEvent = 3000;
  }
  if (def.effect === 'void' && !isClone) {
    // 额外召唤3个虚卒
    for (let i = 0; i < 3; i++) {
      const trash = new Item();
      trash.type = ItemType.TRASH;
      trash.def = ITEM_DEFS[ItemType.TRASH];
      trash.x = Math.random() * (GAME_WIDTH - trash.width);
      trash.y = -trash.height - i * 40;
      trash.speed = CONFIG.baseFallSpeed + Math.random();
      game.items.push(trash);
    }
  }

  // 特殊事件
  if (def.event === 'rainbow' && !isClone) {
    game.rainbowEvent = 5000;
  }
  if (def.event === 'shield' && !isClone) {
    game.shieldEvent = 5000;
  }
  if (def.event === 'hook' && !isClone) {
    game.hookEvent = 4000;
  }
  if (def.event === 'clone' && !isClone) {
    game.hasClone = true;
    game.cloneX = GAME_WIDTH - player.x - player.width;
  }
  if (def.event === 'teleport' && !isClone) {
    // 瞬移到另一端
    if (player.x < GAME_WIDTH / 2) {
      player.x = GAME_WIDTH - player.width - 10;
    } else {
      player.x = 10;
    }
  }
  if (def.event === 'cat' && !isClone) {
    game.catEvent = 10000;
  }

  // 新增事件处理
  if (def.event === 'speed' && !isClone) {
    game.speedEvent = 3000;
    createFloatingText(item.x + item.width / 2, item.y - 20, '加速!', '#38bdf8');
  }
  if (def.event === 'magnet' && !isClone) {
    game.magnetEvent = 5000;
    createFloatingText(item.x + item.width / 2, item.y - 20, '磁力!', '#a78bfa');
  }
  if (def.event === 'cleanse' && !isClone) {
    // 呜呜伯：清除所有减益道具
    let cleanseCount = 0;
    game.items.forEach(other => {
      if (other.def.category === 'bad' && !other.markedForDelete) {
        other.markedForDelete = true;
        createParticles(other.x + other.width / 2, other.y + other.height / 2, '#f472b6', 8);
        cleanseCount++;
      }
    });
    if (cleanseCount > 0) {
      createFloatingText(item.x + item.width / 2, item.y - 20, `清除${cleanseCount}个!`, '#f472b6');
    }
  }
  if (def.effect === 'flash' && !isClone) {
    game.flashEvent = 500;
  }
  if (def.effect === 'reverse' && !isClone) {
    game.reverseEvent = 3000;
    createFloatingText(item.x + item.width / 2, item.y - 20, '反转!', '#ef4444');
  }
  if (def.effect === 'shrink' && !isClone) {
    game.shrinkEvent = 5000;
    createFloatingText(item.x + item.width / 2, item.y - 20, '缩小!', '#ef4444');
  }
  if (def.event === 'mystery' && !isClone) {
    // 迷之镜：随机效果
    const roll = Math.random();
    if (roll < 0.5) {
      const bonus = 15;
      game.score += bonus;
      createFloatingText(item.x + item.width / 2, item.y - 20, `+${bonus} 好运!`, '#FFD700');
      createParticles(item.x + item.width / 2, item.y + item.height / 2, '#FFD700', 12);
    } else {
      const penalty = -15;
      game.score += penalty;
      createFloatingText(item.x + item.width / 2, item.y - 20, `${penalty} 厄运!`, '#ef4444');
      createParticles(item.x + item.width / 2, item.y + item.height / 2, '#ef4444', 12);
      // 随机附加一个负面效果
      const debuffs = ['shake', 'slow', 'flash', 'reverse', 'shrink'];
      const debuff = debuffs[Math.floor(Math.random() * debuffs.length)];
      if (debuff === 'shake') { game.shakeTime = 1000; game.screenShakeIntensity = 8; }
      else if (debuff === 'slow') { game.slowEvent = 3000; }
      else if (debuff === 'flash') { game.flashEvent = 500; }
      else if (debuff === 'reverse') { game.reverseEvent = 3000; }
      else if (debuff === 'shrink') { game.shrinkEvent = 5000; }
    }
  }
  if (def.event === 'trashbin' && !isClone) {
    game.trashbinCount++;
    if (game.trashbinCount >= 3) {
      game.trashbinCount = 0;
      const bonus = 100;
      game.score += bonus;
      createFloatingText(item.x + item.width / 2, item.y - 30, `王下一桶! +${bonus}`, '#FFD700');
      // 清屏加分道具
      game.items.forEach(other => {
        if (other.def.category === 'good' && !other.markedForDelete) {
          other.markedForDelete = true;
          createParticles(other.x + other.width / 2, other.y + other.height / 2, '#FFD700', 6);
        }
      });
      AudioSys.playSpecial();
    } else {
      createFloatingText(item.x + item.width / 2, item.y - 20, `垃圾桶 ${game.trashbinCount}/3`, '#94a3b8');
    }
  }

  // 更新难度
  updateDifficulty();

  // 检查游戏结束（分数过低）
  if (game.score <= -50) {
    game.lives = 0;
    checkGameOver();
  }
}

function updateDifficulty() {
  const spawnReduction = Math.floor(game.score / CONFIG.difficultyScoreStep) * 50;
  game.currentSpawnInterval = Math.max(CONFIG.minSpawnInterval, CONFIG.baseSpawnInterval - spawnReduction);
}

function checkGameOver() {
  if (game.lives <= 0 || game.score <= -50) {
    game.state = GameState.GAMEOVER;
    if (game.score > game.highScore) {
      game.highScore = game.score;
      localStorage.setItem('stardew_catch_highscore', game.highScore.toString());
    }
    AudioSys.playGameOver();
  }
}

// ==================== 游戏控制 ====================
function startGame() {
  AudioSys.init();
  game.state = GameState.PLAYING;
  game.score = 0;
  game.lives = CONFIG.initialLives;
  game.combo = 0;
  game.items = [];
  game.particles = [];
  game.floatingTexts = [];
  game.lastSpawnTime = performance.now();
  game.currentSpawnInterval = CONFIG.baseSpawnInterval;
  game.currentFallSpeedMultiplier = 1;
  game.shakeTime = 0;
  game.screenShakeIntensity = 0;
  game.rainbowEvent = 0;
  game.shieldEvent = 0;
  game.slowEvent = 0;
  game.hookEvent = 0;
  game.catEvent = 0;
  game.speedEvent = 0;
  game.magnetEvent = 0;
  game.reverseEvent = 0;
  game.shrinkEvent = 0;
  game.flashEvent = 0;
  game.trashbinCount = 0;
  game.hasClone = false;
  game.totalCaught = 0;
  game.frames = 0;
  player.x = GAME_WIDTH / 2 - player.width / 2;
  player.speed = CONFIG.playerSpeed;

  // 初始化云朵
  game.clouds = [];
  for (let i = 0; i < 5; i++) {
    game.clouds.push(new Cloud());
  }

  // 初始化星星
  game.stars = [];
  for (let i = 0; i < 80; i++) {
    game.stars.push({
      x: Math.random() * GAME_WIDTH,
      y: Math.random() * (GAME_HEIGHT * 0.5),
      size: Math.random() < 0.8 ? 1 : 2,
      brightness: 0.3 + Math.random() * 0.7,
      phase: Math.random() * Math.PI * 2,
      color: Math.random() < 0.9 ? '#ffffff' : '#ffe4a0'
    });
  }
}

// ==================== 更新逻辑 ====================
function update(dt) {
  game.frames++;

  // 云朵更新（所有状态都更新）
  game.clouds.forEach(c => c.update());

  if (game.state === GameState.PAUSED || game.state === GameState.CHAR_SELECT) return;
  if (game.state !== GameState.PLAYING) return;

  const now = performance.now();

  // 屏幕晃动衰减
  if (game.shakeTime > 0) {
    game.shakeTime -= dt;
    if (game.shakeTime < 0) game.shakeTime = 0;
  }

  // 事件计时器衰减
  if (game.rainbowEvent > 0) game.rainbowEvent -= dt;
  if (game.shieldEvent > 0) game.shieldEvent -= dt;

  let baseSpeed = CONFIG.playerSpeed;
  if (game.slowEvent > 0) {
    game.slowEvent -= dt;
    baseSpeed *= 0.5;
  }
  if (game.speedEvent > 0) {
    game.speedEvent -= dt;
    baseSpeed *= 1.5;
  }
  if (game.reverseEvent > 0) {
    game.reverseEvent -= dt;
  }
  if (game.shrinkEvent > 0) {
    game.shrinkEvent -= dt;
    player.width = CONFIG.playerWidth * 0.7;
    player.height = CONFIG.playerHeight * 0.7;
  } else {
    player.width = CONFIG.playerWidth;
    player.height = CONFIG.playerHeight;
  }
  if (game.flashEvent > 0) {
    game.flashEvent -= dt;
  }
  if (game.magnetEvent > 0) {
    game.magnetEvent -= dt;
    // 磁力吸引：将附近加分道具拉向玩家
    game.items.forEach(item => {
      if (item.def.category === 'good' && !item.markedForDelete) {
        const dx = (player.x + player.width / 2) - (item.x + item.width / 2);
        const dy = (player.y + player.height / 2) - (item.y + item.height / 2);
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150 && dist > 10) {
          item.x += (dx / dist) * 3;
          item.y += (dy / dist) * 3;
        }
      }
    });
  }
  player.speed = baseSpeed;

  if (game.hookEvent > 0) game.hookEvent -= dt;
  if (game.catEvent > 0) game.catEvent -= dt;

  // 分身跟随（镜像）
  if (game.hasClone) {
    game.cloneX = GAME_WIDTH - player.x - player.width;
  }

  // 玩家移动（支持反转控制）
  let moveInput = false;
  const leftPressed = Input.isLeft();
  const rightPressed = Input.isRight();
  const goingLeft = game.reverseEvent > 0 ? rightPressed : leftPressed;
  const goingRight = game.reverseEvent > 0 ? leftPressed : rightPressed;

  if (goingLeft) {
    player.x -= player.speed;
    player.facingRight = false;
    moveInput = true;
  }
  if (goingRight) {
    player.x += player.speed;
    player.facingRight = true;
    moveInput = true;
  }
  // 鼠标输入（优先于键盘）
  if (Input.mouseActive && !moveInput) {
    const targetX = Input.mouseX - player.width / 2;
    const diff = targetX - player.x;
    if (Math.abs(diff) > 2) {
      player.x += Math.sign(diff) * Math.min(Math.abs(diff), player.speed);
      player.facingRight = diff > 0;
    }
  }
  // 边界限制
  player.x = Math.max(0, Math.min(GAME_WIDTH - player.width, player.x));

  // 生成道具
  if (game.items.length < CONFIG.maxItemsOnScreen && now - game.lastSpawnTime > game.currentSpawnInterval) {
    game.items.push(new Item());
    game.lastSpawnTime = now;
  }

  // 更新道具
  for (let i = game.items.length - 1; i >= 0; i--) {
    const item = game.items[i];
    item.update(dt);

    // 诱钩效果：吃掉减益道具
    if (game.hookEvent > 0 && item.def.category === 'bad' && !item.markedForDelete) {
      // 三月七的弓：在屏幕上横向发射箭矢
      const fishY = GAME_HEIGHT / 2 + Math.sin(game.frames * 0.03) * 50;
      const fishX = (game.frames * 3) % (GAME_WIDTH + 100) - 50;
      const dx = (item.x + item.width / 2) - fishX;
      const dy = (item.y + item.height / 2) - fishY;
      if (Math.sqrt(dx * dx + dy * dy) < 60) {
        item.markedForDelete = true;
        createParticles(item.x + item.width / 2, item.y + item.height / 2, '#f472b6', 8);
        AudioSys.playGood();
        createFloatingText(item.x, item.y, '三月七出击!', '#f472b6');
        continue;
      }
    }

    // 护盾发生器效果：自动吸引所有道具
    if (game.shieldEvent > 0 && !item.markedForDelete) {
      const dx = (item.x + item.width / 2) - (player.x + player.width / 2);
      const dy = (item.y + item.height / 2) - (player.y + player.height / 2);
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        // 自动吸向玩家
        item.x += dx * -0.05;
        item.y += dy * -0.05;
      }
    }

    // 碰撞检测 - 主玩家
    if (!item.markedForDelete && checkCollision(player, item)) {
      item.markedForDelete = true;
      applyItemEffect(item);
      continue;
    }

    // 碰撞检测 - 分身
    if (!item.markedForDelete && game.hasClone) {
      const cloneRect = { x: game.cloneX, y: player.y, width: player.width, height: player.height };
      if (checkCollision(cloneRect, item)) {
        item.markedForDelete = true;
        applyItemEffect(item, true);
        continue;
      }
    }

    // 碰撞检测 - 猫咪（只撞 bad 道具）
    if (!item.markedForDelete && game.catEvent > 0 && item.def.category === 'bad') {
      const catX = player.x + player.width + 15;
      const catY = player.y + player.height - 40;
      const catRect = { x: catX, y: catY, width: 44, height: 40 };
      if (checkCollision(catRect, item)) {
        item.markedForDelete = true;
        createParticles(item.x + item.width / 2, item.y + item.height / 2, '#FFA500', 10);
        AudioSys.playGood();
        createFloatingText(item.x + item.width / 2, item.y, '帕姆出击!', '#E8E8F0');
        continue;
      }
    }

    if (item.markedForDelete) {
      game.items.splice(i, 1);
    }
  }

  // 更新粒子
  for (let i = game.particles.length - 1; i >= 0; i--) {
    game.particles[i].update();
    if (game.particles[i].life <= 0) game.particles.splice(i, 1);
  }

  // 更新飘字
  for (let i = game.floatingTexts.length - 1; i >= 0; i--) {
    game.floatingTexts[i].update();
    if (game.floatingTexts[i].life <= 0) game.floatingTexts.splice(i, 1);
  }
}

// ==================== 绘制逻辑 ====================
function draw() {
  ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

  ctx.save();

  // 屏幕晃动效果
  if (game.shakeTime > 0) {
    const intensity = game.screenShakeIntensity * (game.shakeTime / 1000);
    const dx = (Math.random() - 0.5) * intensity * 2;
    const dy = (Math.random() - 0.5) * intensity * 2;
    ctx.translate(dx, dy);
  }

  // 背景
  drawBackground(ctx);

  // 屏幕闪光效果（吵闹金人）
  if (game.flashEvent > 0) {
    const flashAlpha = 0.3 * (game.flashEvent / 500);
    ctx.fillStyle = `rgba(255, 215, 0, ${flashAlpha})`;
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
  }

  // 彩虹雨事件特效
  if (game.rainbowEvent > 0) {
    ctx.fillStyle = `rgba(255, 255, 255, ${0.1 + Math.sin(game.frames * 0.1) * 0.05})`;
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    ctx.fillStyle = '#FF69B4';
    ctx.font = '16px "Microsoft YaHei", "PingFang SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('★ 彩虹雨! ★', GAME_WIDTH / 2, 80);
  }

  // 三月七的弓箭（诱钩事件）
  if (game.hookEvent > 0) {
    const arrowY = GAME_HEIGHT / 2 + Math.sin(game.frames * 0.03) * 50;
    const arrowX = (game.frames * 3) % (GAME_WIDTH + 100) - 50;
    ctx.save();
    ctx.translate(arrowX, arrowY);
    // 粉色箭矢
    ctx.fillStyle = '#f472b6';
    ctx.beginPath();
    ctx.roundRect(-20, -2, 50, 4, 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(25, -5);
    ctx.lineTo(33, 0);
    ctx.lineTo(25, 5);
    ctx.closePath();
    ctx.fill(); // 箭头
    ctx.fillStyle = '#38bdf8';
    ctx.beginPath();
    ctx.ellipse(-22, -4, 5, 2.5, 0.3, 0, Math.PI * 2);
    ctx.fill(); // 尾羽上
    ctx.beginPath();
    ctx.ellipse(-22, 4, 5, 2.5, -0.3, 0, Math.PI * 2);
    ctx.fill(); // 尾羽下
    // 光效
    ctx.fillStyle = `rgba(244, 114, 182, ${0.3 + Math.sin(game.frames * 0.1) * 0.2})`;
    ctx.beginPath();
    ctx.arc(0, 0, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // 道具
  game.items.forEach(item => item.draw(ctx));

  // 分身
  if (game.hasClone) {
    ctx.globalAlpha = 0.5;
    drawPlayerSprite(ctx, game.cloneX, player.y, player.width, player.height, !player.facingRight);
    ctx.globalAlpha = 1;
  }

  // 玩家
  drawPlayerSprite(ctx, player.x, player.y, player.width, player.height, player.facingRight);

  // 猫咪
  if (game.catEvent > 0) {
    const catX = player.x + player.width + 15;
    const catY = player.y + player.height - 40;
    drawCat(ctx, catX, catY);
  }

  // 粒子
  game.particles.forEach(p => p.draw(ctx));

  // 飘字
  game.floatingTexts.forEach(t => t.draw(ctx));

  ctx.restore(); // 恢复屏幕晃动前的状态

  // UI（不受屏幕晃动影响）
  drawUI(ctx);

  // 状态界面
  if (game.state === GameState.CHAR_SELECT) {
    drawCharSelect(ctx);
  } else if (game.state === GameState.MENU) {
    drawMenu(ctx);
  } else if (game.state === GameState.PAUSED) {
    drawPaused(ctx);
  } else if (game.state === GameState.GAMEOVER) {
    drawGameOver(ctx);
  }
}

  ctx.fillStyle = '#94a3b8';

  if (game.combo >= CONFIG.comboThreshold) {
    const multiplier = Math.min(1 + Math.floor((game.combo - CONFIG.comboThreshold) / 5) * 0.2, CONFIG.maxComboMultiplier);

    ctx.fillStyle = '#a78bfa';
    ctx.font = '12px "Microsoft YaHei", "PingFang SC", sans-serif';
    const comboText = `${game.combo} 连击! x${multiplier.toFixed(1)}`;
    ctx.fillText(comboText, GAME_WIDTH / 2, 34);
  }

  // 状态图标（科技风）
  let statusX = 14;
  const statusY = GAME_HEIGHT - 20;
  ctx.font = '10px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.textAlign = 'left';
  if (game.shieldEvent > 0) {
    ctx.fillStyle = '#38bdf8';
    ctx.fillText(`◈ 护盾 ${Math.ceil(game.shieldEvent / 1000)}s`, statusX, statusY);
    statusX += 90;
  }
  if (game.rainbowEvent > 0) {
    ctx.fillStyle = '#a78bfa';
    ctx.fillText(`◈ 通票 ${Math.ceil(game.rainbowEvent / 1000)}s`, statusX, statusY);
    statusX += 90;
  }
  if (game.slowEvent > 0) {
    ctx.fillStyle = '#ef4444';
    ctx.fillText(`◈ 减速 ${Math.ceil(game.slowEvent / 1000)}s`, statusX, statusY);
    statusX += 90;
  }
  if (game.hookEvent > 0) {
    ctx.fillStyle = '#f472b6';
    ctx.fillText(`◈ 弓 ${Math.ceil(game.hookEvent / 1000)}s`, statusX, statusY);
    statusX += 80;
  }
  if (game.catEvent > 0) {
    ctx.fillStyle = '#E8E8F0';
    ctx.fillText(`◈ 帕姆 ${Math.ceil(game.catEvent / 1000)}s`, statusX, statusY);
    statusX += 90;
  }
  if (game.hasClone) {
    ctx.fillStyle = '#6366f1';
    ctx.fillText('◈ 镜像', statusX, statusY);
    statusX += 70;
  }
  if (game.speedEvent > 0) {
    ctx.fillStyle = '#38bdf8';
    ctx.fillText(`◈ 加速 ${Math.ceil(game.speedEvent / 1000)}s`, statusX, statusY);
    statusX += 90;
  }
  if (game.magnetEvent > 0) {
    ctx.fillStyle = '#a78bfa';
    ctx.fillText(`◈ 磁力 ${Math.ceil(game.magnetEvent / 1000)}s`, statusX, statusY);
    statusX += 90;
  }
  if (game.reverseEvent > 0) {
    ctx.fillStyle = '#ef4444';
    ctx.fillText(`◈ 反转 ${Math.ceil(game.reverseEvent / 1000)}s`, statusX, statusY);
    statusX += 90;
  }
  if (game.shrinkEvent > 0) {
    ctx.fillStyle = '#f472b6';
    ctx.fillText(`◈ 缩小 ${Math.ceil(game.shrinkEvent / 1000)}s`, statusX, statusY);
    statusX += 90;
  }
  if (game.flashEvent > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.fillText(`◈ 闪光`, statusX, statusY);
    statusX += 60;
  }
  if (game.trashbinCount > 0) {
    ctx.fillStyle = '#64748b';
    ctx.fillText(`◈ 垃圾桶 ${game.trashbinCount}/3`, statusX, statusY);
  }

  // 右上角道具说明面板
  drawItemLegend(ctx);
}

function drawItemLegend(ctx) {
  const panelX = GAME_WIDTH - 198;
  const panelY = 58;
  const panelW = 190;
  const rowH = 30;
  const colW = 90;
  const iconSize = 18;

  const leftItems = [0, 1, 2, 3, 4, 9, 10, 13, 14, 15, 16];
  const rightItems = [5, 6, 7, 8, 11, 12, 17, 18, 19, 20, 21];
  const rows = Math.max(leftItems.length, rightItems.length);
  const panelH = rows * rowH + 28;

  // 面板背景
  ctx.save();
  ctx.fillStyle = 'rgba(6, 10, 26, 0.75)';
  roundRect(ctx, panelX, panelY, panelW, panelH, 6);
  ctx.fill();
  ctx.strokeStyle = 'rgba(99, 102, 241, 0.4)';
  ctx.lineWidth = 1;
  roundRect(ctx, panelX, panelY, panelW, panelH, 6);
  ctx.stroke();

  // 标题
  ctx.fillStyle = 'rgba(56, 189, 248, 0.3)';
  ctx.fillRect(panelX + 1, panelY + 1, panelW - 2, 20);
  ctx.font = '11px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#38bdf8';
  ctx.fillText('◈ 道具说明 ◈', panelX + panelW / 2, panelY + 15);

  // 绘制单列
  function drawCol(items, baseX, baseY) {
    items.forEach((type, i) => {
      const info = getItemInfo(type);
      const ix = baseX;
      const iy = baseY + i * rowH;

      // 小图标
      ctx.save();
      ctx.translate(ix, iy);
      const scale = iconSize / 32;
      ctx.scale(scale, scale);
      drawItemSprite(ctx, type, 0, 0, 32, 32);
      ctx.restore();

      // 名称
      ctx.textAlign = 'left';
      ctx.font = '10px "Microsoft YaHei", "PingFang SC", sans-serif';
      ctx.fillStyle = info.color;
      ctx.fillText(info.name, ix + iconSize + 4, iy + 9);

      // 效果
      ctx.font = '9px "Microsoft YaHei", "PingFang SC", sans-serif';
      ctx.fillStyle = '#94a3b8';
      ctx.fillText(info.desc, ix + iconSize + 4, iy + 19);
    });
  }

  const contentY = panelY + 26;
  drawCol(leftItems, panelX + 8, contentY);
  drawCol(rightItems, panelX + 8 + colW, contentY);
  ctx.restore();
}

// ==================== 动漫风格开拓者绘制 ====================
function drawTrailblazerMale(ctx, cx, cy, scale = 1.0) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  // 阴影
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, 55, 35, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // 使用图片
  if (imgStellarMale.complete && imgStellarMale.naturalWidth > 0) {
    const imgScale = 140 / imgStellarMale.naturalWidth;
    const drawW = imgStellarMale.naturalWidth * imgScale;
    const drawH = imgStellarMale.naturalHeight * imgScale;
    ctx.drawImage(imgStellarMale, -drawW / 2, -drawH + 55, drawW, drawH);
  } else {
    // 后备：绘制占位椭圆
    ctx.fillStyle = '#94a3b8';
    ctx.beginPath();
    ctx.ellipse(0, -10, 30, 45, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#cbd5e1';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('加载中...', 0, -5);
  }

  ctx.restore();
}

  ctx.fillRect(98, 518, 20, 4);
  ctx.fillRect(98, 502, 4, 20);
  ctx.fillRect(682, 518, 20, 4);
  ctx.fillRect(698, 502, 4, 20);

  // 标题
  ctx.textAlign = 'center';
  ctx.font = '24px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = '#38bdf8';
  ctx.fillText('星穹铁道', GAME_WIDTH / 2, 160);
  ctx.font = '16px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = '#a78bfa';
  ctx.fillText('星际跃迁', GAME_WIDTH / 2, 200);

  // 副标题
  ctx.font = '10px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText('收集星琼 · 击退虚卒 · 挑战高分', GAME_WIDTH / 2, 235);

  // 游戏目标 / 通关条件面板
  const goalY = 255;
  const goalH = 75;
  ctx.fillStyle = 'rgba(30, 27, 75, 0.5)';
  roundRect(ctx, GAME_WIDTH / 2 - 180, goalY, 360, goalH, 6);
  ctx.fill();
  ctx.strokeStyle = 'rgba(56, 189, 248, 0.3)';
  ctx.lineWidth = 1;
  roundRect(ctx, GAME_WIDTH / 2 - 180, goalY, 360, goalH, 6);
  ctx.stroke();

  ctx.font = '11px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#38bdf8';
  ctx.fillText('◈ 跃迁目标 ◈', GAME_WIDTH / 2, goalY + 18);

  ctx.font = '9px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = '#cbd5e1';
  ctx.fillText('① 接取星琼与光锥获取分数，连续接取触发连击加成', GAME_WIDTH / 2, goalY + 34);
  ctx.fillText('② 收集通票、护盾、分身等特殊道具获得能力', GAME_WIDTH / 2, goalY + 48);
  ctx.fillText('③ 躲避虚卒、裂界造物等减益道具，能量归零则跃迁失败', GAME_WIDTH / 2, goalY + 62);

  // 操作说明
  ctx.font = '10px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = '#64748b';
  ctx.fillText('控制: ← → / A D 或 鼠标移动', GAME_WIDTH / 2, 345);
  ctx.fillText('按空格键开始', GAME_WIDTH / 2, 365);

  // 道具图鉴预览
  const demoItems = [ItemType.PARSNIP, ItemType.TRASH, ItemType.STARFRUIT, ItemType.CAT];
  const demoLabels = ['星琼', '虚卒', '光锥', '帕姆!'];
  demoItems.forEach((type, i) => {
    const dx = GAME_WIDTH / 2 - 80 + i * 55;
    const dy = 405;
    drawItemSprite(ctx, type, dx, dy, 32, 32);
    ctx.font = '8px "Microsoft YaHei", "PingFang SC", sans-serif';
    ctx.fillStyle = '#cbd5e1';
    ctx.fillText(demoLabels[i], dx + 16, dy + 44);
  });

  // 闪烁的开始提示
  if (Math.floor(game.frames / 30) % 2 === 0) {
    ctx.font = '12px "Microsoft YaHei", "PingFang SC", sans-serif';
    ctx.fillStyle = '#38bdf8';
    ctx.fillText('◈ 点击开始 ◈', GAME_WIDTH / 2, 490);
  }
}

function drawGameOver(ctx) {
  ctx.fillStyle = 'rgba(6, 10, 26, 0.8)';
  ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

  // 科技边框
  ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)';
  ctx.lineWidth = 2;
  ctx.strokeRect(150, 100, 500, 380);
  ctx.fillStyle = 'rgba(239, 68, 68, 0.05)';
  ctx.fillRect(150, 100, 500, 380);

  ctx.textAlign = 'center';
  ctx.font = '24px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = '#ef4444';
  ctx.fillText('跃迁失败', GAME_WIDTH / 2, 170);

  ctx.font = '14px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = '#e2e8f0';
  ctx.fillText(`最终得分: ${game.score}`, GAME_WIDTH / 2, 230);

  ctx.font = '10px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = '#38bdf8';
  ctx.fillText(`最高分: ${game.highScore}`, GAME_WIDTH / 2, 265);
  ctx.fillStyle = '#a78bfa';
  ctx.fillText(`最大连击: ${game.maxCombo}`, GAME_WIDTH / 2, 290);
  ctx.fillStyle = '#94a3b8';
  ctx.fillText(`收集星琼: ${game.totalCaught}`, GAME_WIDTH / 2, 315);

  if (game.score >= game.highScore && game.score > 0) {
    ctx.font = '12px "Microsoft YaHei", "PingFang SC", sans-serif';
    ctx.fillStyle = '#FFD700';
    if (Math.floor(game.frames / 20) % 2 === 0) {
      ctx.fillText('◈ 新纪录! ◈', GAME_WIDTH / 2, 355);
    }
  }

  ctx.font = '12px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = '#64748b';
  ctx.fillText('点击或按空格键重新开始', GAME_WIDTH / 2, 420);
}

function drawPaused(ctx) {
  ctx.fillStyle = 'rgba(6, 10, 26, 0.6)';
  ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

  // 科技边框
  ctx.strokeStyle = 'rgba(56, 189, 248, 0.4)';
  ctx.lineWidth = 2;
  ctx.strokeRect(250, 200, 300, 200);
  ctx.fillStyle = 'rgba(56, 189, 248, 0.05)';
  ctx.fillRect(250, 200, 300, 200);

  ctx.textAlign = 'center';
  ctx.font = '24px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = '#38bdf8';
  ctx.fillText('暂 停', GAME_WIDTH / 2, 270);

  ctx.font = '12px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText('按空格键继续跃迁', GAME_WIDTH / 2, 320);

  if (Math.floor(game.frames / 30) % 2 === 0) {
    ctx.font = '10px "Microsoft YaHei", "PingFang SC", sans-serif';
    ctx.fillStyle = '#a78bfa';
    ctx.fillText('◈ 空格继续 ◈', GAME_WIDTH / 2, 360);
  }
}

// ==================== 主循环 ====================
let lastTime = performance.now();

function gameLoop(now) {
  const dt = now - lastTime;
  lastTime = now;

  update(dt);
  draw();

  requestAnimationFrame(gameLoop);
}

// 启动
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
